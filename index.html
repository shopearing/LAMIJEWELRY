<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Your Products</title>
    <style>
        /* --- Earthy Minimalist Luxury Styling --- */
        :root {
            --primary-color: #1A1A1A;      /* Matte Black */
            --bg-color: #F3EFE6;           /* Warm Cream Background */
            --card-bg: #FFFFFF;            /* Pure White Card Base */
            --text-muted: #666666;         /* Subdued Text */
            --border-color: #CBB594;       /* Earthy Kraft Paper Beige */
            --whatsapp-color: #2A5435;     /* Deep Forest Green */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }

        @media (min-width: 992px) {
            .container {
                grid-template-columns: 1.4fr 1fr;
                align-items: start;
            }
        }

        /* --- Lookbook Grid (2x2 Layout) --- */
        .lookbook-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 600px) {
            .lookbook-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* --- Full Image Product Card Layout --- */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 20px;
            box-shadow: 0 4px 15px rgba(26, 26, 26, 0.03);
        }

        .card-main-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            margin: 0;
            cursor: zoom-in; /* Indicates it can be expanded */
            transition: opacity 0.2s;
        }

        .card-main-image:hover {
            opacity: 0.95;
        }

        /* Text & details nested container */
        .card-info-section {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }

        .card-title { 
            font-size: 1.15rem; 
            font-weight: 600; 
            letter-spacing: -0.3px;
        }
        
        .card-price { 
            font-size: 1.15rem; 
            font-weight: 700; 
            color: var(--primary-color); 
        }

        /* Mini thumbnail layout */
        .card-thumb-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .mini-thumb-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .mini-thumb {
            width: 100%;
            border-radius: 6px;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border-color);
        }

        .mini-thumb:hover { 
            transform: scale(1.05);
            border-color: var(--primary-color);
        }

        /* --- Premium Order Form Card --- */
        .order-card {
            background: var(--card-bg);
            padding: 35px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(26, 26, 26, 0.05);
            border: 1px solid var(--border-color);
            position: sticky;
            top: 40px;
        }

        .order-card h2 { 
            font-size: 1.5rem; 
            margin-bottom: 10px; 
            font-weight: 600; 
            letter-spacing: -0.5px;
        }

        .form-group { margin-bottom: 22px; }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background-color: var(--card-bg);
            color: var(--primary-color);
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--whatsapp-color);
            color: #fff;
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .submit-btn:hover { 
            background-color: #1e3d26; 
        }
        
        .submit-btn:disabled { 
            background-color: #92b09a; 
            cursor: not-allowed; 
        }

        /* --- Luxury Fullscreen Image Lightbox Overlay --- */
        .image-lightbox {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 26, 0.9); /* Dark elegant overlay */
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transform: scale(0.95);
            transition: transform 0.3s ease;
            object-fit: contain;
        }

        .image-lightbox.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #F3EFE6;
            font-size: 40px;
            font-weight: 200;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }

        .lightbox-close:hover {
            color: var(--border-color);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <section class="lookbook-grid">
            
            <div class="product-card">
                <img class="card-main-image" id="img-ref001" src="images/r1.png" onclick="openLightbox(this.src)" alt="REF-001 Display">
                <div class="card-info-section">
                    <div class="card-details">
                        <span class="card-title">Model REF-001</span>
                        <span class="card-price">2000 DZD</span>
                    </div>
                    <div class="card-thumb-grid">
                        <div class="mini-thumb-container">
                            <img class="mini-thumb" src="images/r01.png" onclick="changeCardPhoto('img-ref001', this.src, 'REF-001')" alt="Color 1">
                        </div>
                        <div class="mini-thumb-container">
                            <img class="mini-thumb" src="images/r001.png" onclick="changeCardPhoto('img-ref001', this.src, 'REF-001-S')" alt="Color 2">
                        </div>
                        <div class="mini-thumb-container">
                            <img class="mini-thumb" src="images/r0001.jpg" onclick="changeCardPhoto('img-ref001', this.src, 'REF-001-S')" alt="Color 3">
                        </div>
                        <div class="mini-thumb-container">
                            <img class="mini-thumb" src="images/r00001.png" onclick="changeCardPhoto('img-ref001', this.src, 'REF-001-S')" alt="Color 4">
                        </div>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <img class="card-main-image" id="img-ref002" src="images/r2.png" onclick="openLightbox(this.src)" alt="REF-002 Display">
                <div class="card-info-section">
                    <div class="card-details">
                        <span class="card-title">Model REF-002</span>
                        <span class="card-price">2000 DZD</span>
                    </div>
                    <div class="card-thumb-grid">
                        <div class="mini-thumb-container">
                            <img class="mini-thumb" src="images/r02.png" onclick="changeCardPhoto('img-ref002', this.src, 'REF-002')" alt="Color 1">
                        </div>
                        <div class="mini-thumb-container">
                            <img class="mini-thumb" src="images/r002.jpg" onclick="changeCardPhoto('img-ref002', this.src, 'REF-002-S')" alt="Color 2">
                        </div>
                        <div class="mini-thumb-container">
                            <img class="mini-thumb" src="images/r0002.png" onclick="changeCardPhoto('img-ref002', this.src, 'REF-002-S')" alt="Color 3">
                        </div>
                        <div class="mini-thumb-container">
                            <img class="mini-thumb" src="images/r00002.png" onclick="changeCardPhoto('img-ref002', this.src, 'REF-002-S')" alt="Color 4">
                        </div>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <img class="card-main-image" id="img-ref003" src="images/r03.png" onclick="openLightbox(this.src)" alt="REF-003 Display">
                <div class="card-info-section">
                    <div class="card-details">
                        <span class="card-title">Model REF-003</span>
                        <span class="card-price">1800 DZD</span>
                    </div>
                    <div class="card-thumb-grid">
                        <div class="mini-thumb-container">
                            <img class="mini-thumb" src="images/r3.jpg" onclick="changeCardPhoto('img-ref003', this.src, 'REF-003')" alt="Color 1">
                        </div>
                        <div class="mini-thumb-container">
                            <img class="mini-thumb" src="images/r003.png" onclick="changeCardPhoto('img-ref003', this.src, 'REF-003-Y')" alt="Color 2">
                        </div>
                        <div class="mini-thumb-container">
                            <img class="mini-thumb" src="images/r0003.png" onclick="changeCardPhoto('img-ref003', this.src, 'REF-003-O')" alt="Color 3">
                        </div>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <img class="card-main-image" id="img-ref004" src="images/r04.png" onclick="openLightbox(this.src)" alt="REF-004 Display">
                <div class="card-info-section">
                    <div class="card-details">
                        <span class="card-title">Model REF-004</span>
                        <span class="card-price">1800 DZD</span>
                    </div>
                    <div class="card-thumb-grid">
                        <div class="mini-thumb-container">
                            <img class="mini-thumb" src="images/r4.png" onclick="changeCardPhoto('img-ref004', this.src, 'REF-004')" alt="Color 1">
                        </div>
                    </div>
                </div>
            </div>

        </section>

        <section class="order-card">
            <h2>Complete Your Order</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px;">
                Your order logs instantly to our database, and we'll connect on WhatsApp to confirm delivery details.
            </p>
            
            <form id="hybridOrderForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="client_name" placeholder="e.g., John Doe" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone_number" placeholder="e.g., 0550 00 00 00" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="client_email" placeholder="e.g., name@email.com" required>
                </div>

                <div class="form-group">
                    <label for="location">Delivery Address / State</label>
                    <input type="text" id="location" name="delivery_location" placeholder="e.g., Algiers, Batna" required>
                </div>

                <div class="form-group">
                    <label for="deliveryType">Delivery Type</label>
                    <select id="deliveryType" name="delivery_type" required>
                        <option value="Home Delivery">Home Delivery (À Domicile)</option>
                        <option value="Desk / Office Pick-up">Desk / Stop Desk Pick-up</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="productSelect">Choose Product Model & Color Variation</label>
                    <select id="productSelect" name="item_reference" required>
                        <optgroup label="Model REF-001 Options">
                            <option value="REF-001" data-name="REF-001 (Gold)" data-price="1500 DZD">REF-001 MONOCHROME (2000 DZD)</option>
                            
                        </optgroup>
                        <optgroup label="Model REF-002 Options">
                            <option value="REF-002" data-name="REF-002 (Gold)" data-price="1800 DZD">REF-002 MONOCHROME (2000 DZD)</option>
                            
                        </optgroup>
                        <optgroup label="Model REF-003 Options">
                            <option value="REF-003" data-name="REF-003 (Base)" data-price="2000 DZD">REF-003 MONOCHROME (1800 DZD)</option>
                           
                        </optgroup>
                        <optgroup label="Model REF-004 Options">
                            <option value="REF-004" data-name="REF-004 (Base)" data-price="2200 DZD">REF-004 MONOCHROME (1800 DZD)</option>
                           
                        </optgroup>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="submit-btn">Confirm & Send via WhatsApp</button>
            </form>
        </section>

    </div>

    <div id="lightboxOverlay" class="image-lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-content" id="lightboxTargetImg" src="" alt="Zoomed view">
    </div>

    <script>
        // Clicking a small thumbnail updates the main image element AND selects it inside the form dropdown
        function changeCardPhoto(cardImgId, newSrc, dropdownValue) {
            document.getElementById(cardImgId).src = newSrc;
            const select = document.getElementById('productSelect');
            select.value = dropdownValue;
        }

        // SHOWABLE LIGHTBOX LOGIC
        function openLightbox(imageSrc) {
            const lightbox = document.getElementById('lightboxOverlay');
            const targetImg = document.getElementById('lightboxTargetImg');
            targetImg.src = imageSrc;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightboxOverlay').classList.remove('active');
        }

        // --- HYBRID TELEMETRY CONFIGURATION ---
        const googleScriptURL = 'https://script.google.com/macros/s/AKfycbyxw3i3TLv-t9QTWHDmWC731g5C6SsohX_XJKQ6ybJnGOBfjzKQjoZPM8xneCDfF94l/exec';
        const whatsappNumber = '213697070026'; 

        const form = document.getElementById('hybridOrderForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Processing Order...";

            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const location = document.getElementById('location').value;
            const deliveryType = document.getElementById('deliveryType').value;
            
            const select = document.getElementById('productSelect');
            const selectedOption = select.options[select.selectedIndex];
            const productName = selectedOption.getAttribute('data-name');
            const itemRef = select.value; 
            const currentPrice = selectedOption.getAttribute('data-price');

            fetch(googleScriptURL, { method: 'POST', body: new FormData(form) })
                .then(response => {
                    console.log('Successfully logged to Google Sheets');
                    
                    const message = `*🆕 NEW ORDER RECEIVED* \n\n` +
                                    `👤 *Name:* ${name}\n` +
                                    `📞 *Phone:* ${phone}\n` +
                                    `📧 *Email:* ${email}\n` +
                                    `📍 *Location:* ${location}\n` +
                                    `🚚 *Delivery Type:* ${deliveryType}\n\n` + 
                                    `🛍️ *Product Name:* ${productName}\n` +
                                    `📦 *Item Reference:* ${itemRef}\n` +
                                    `💰 *Total Price:* ${currentPrice}\n\n` +
                                    `Please confirm my shipping details directly!`;

                    const encodedMessage = encodeURIComponent(message);
                    const whatsappURL = `https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${encodedMessage}`;

                    form.reset();
                    btn.disabled = false;
                    btn.innerText = "Confirm & Send via WhatsApp";

                    window.open(whatsappURL, '_blank');
                })
                .catch(error => {
                    alert("Error connection failed. Please try submitting again.");
                    console.error('Error logging data:', error.message);
                    btn.disabled = false;
                    btn.innerText = "Confirm & Send via WhatsApp";
                });
        });
    </script>
</body>
</html>
